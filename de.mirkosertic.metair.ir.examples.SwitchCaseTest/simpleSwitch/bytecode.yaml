
  - method name: simpleSwitch
    flags: []
    method type: (I)I
    attributes: [Code]
    code: 
        max stack: 1
        max locals: 2
        attributes: [LineNumberTable, LocalVariableTable, StackMapTable]
        line numbers: 
          - {start: 0, line number: 9}
          - {start: 28, line number: 10}
          - {start: 33, line number: 11}
          - {start: 39, line number: 12}
          - {start: 42, line number: 9}
        local variables: 
          - {start: 0, end: 43, slot: 0, name: this, type: Lde/mirkosertic/metair/ir/examples/SwitchCaseTest;}
          - {start: 0, end: 43, slot: 1, name: value, type: I}
        stack map frames: 
            28: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
            33: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
            39: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
            42: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: [int]}
        //stack map frame @0: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
        0: {opcode: ILOAD_1, slot: 1, type: I, variable name: value}
        1: {opcode: LOOKUPSWITCH, targets: [39, 28, 33]}
        //stack map frame @28: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
        28: {opcode: BIPUSH, constant value: 100}
        30: {opcode: GOTO, target: 42}
        //stack map frame @33: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
        33: {opcode: SIPUSH, constant value: 200}
        36: {opcode: GOTO, target: 42}
        //stack map frame @39: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: []}
        39: {opcode: SIPUSH, constant value: 300}
        //stack map frame @42: {locals: [de/mirkosertic/metair/ir/examples/SwitchCaseTest, int], stack: [int]}
        42: {opcode: IRETURN}
